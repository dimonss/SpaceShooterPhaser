<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Space Shooter — аркадная космическая стрелялка на Phaser 3. Уничтожай астероиды, собирай бонусы и защищай галактику!" />
  <meta name="author" content="chalysh dmitrii" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Open Graph -->
  <meta property="og:title" content="Space Shooter — Phaser Game" />
  <meta property="og:description" content="Аркадная космическая стрелялка. Уничтожай астероиды и защищай галактику!" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Space Shooter — Phaser Game" />
  <meta name="twitter:description" content="Аркадная космическая стрелялка. Уничтожай астероиды и защищай галактику!" />

  <title>Space Shooter — Phaser Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HTML Loader (visible immediately, before any JS) ── */
    #html-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0b0b2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.4s ease;
    }

    #html-loader.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loader-title {
      font-family: 'Courier New', monospace;
      font-size: clamp(18px, 4vw, 28px);
      letter-spacing: 0.25em;
      color: #00ccff;
      text-shadow: 0 0 16px #00ccff88;
    }

    .loader-bar-wrap {
      width: min(320px, 80vw);
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ccff, #6666ff);
      border-radius: 999px;
      animation: loader-sweep 1.4s ease-in-out infinite;
    }

    @keyframes loader-sweep {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }

    .loader-dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin: 0 4px;
      border-radius: 50%;
      background: #6666ff;
      animation: loader-dot 1.2s ease-in-out infinite;
    }
    .loader-dots span:nth-child(1) { animation-delay: 0s;    background: #00ccff; }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s;  background: #4499ff; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s;  background: #6666ff; }

    @keyframes loader-dot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1.3); opacity: 1; }
    }
  </style>
</head>

<body>
  <!-- Loader visible immediately before any JS executes -->
  <div id="html-loader">
    <div class="loader-title">SPACE SHOOTER</div>
    <div class="loader-bar-wrap">
      <div class="loader-bar-fill"></div>
    </div>
    <div class="loader-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
